name: CI - Build and Test

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-terraform:
    name: Lint Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -diff

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Security Scan with TFSec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra

  lint-docker:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web-app/Dockerfile

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (if needed for static assets)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate HTML Templates
        working-directory: web-app/templates
        run: |
          echo "Checking HTML files..."
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              # Basic HTML validation
              if ! grep -q "</html>" "$file"; then
                echo "Warning: $file may not have proper closing tags"
              fi
            fi
          done

      - name: Check CSS Syntax
        working-directory: web-app/static
        run: |
          echo "Checking CSS files..."
          if [ -f "style.css" ]; then
            # Install CSS validator
            npm install -g csso-cli
            csso style.css --output style.css.validated
            echo "CSS validation passed!"
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: web-app
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image
        run: |
          docker build -t test-image:latest web-app/
          echo "Testing Docker image..."
          docker run --rm -d -p 8080:80 test-image:latest
          sleep 3
          if curl -f http://localhost:8080/; then
            echo "Docker image test passed!"
          else
            echo "Docker image health check failed"
            exit 1
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Run SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            p/dockerfile

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Repository Structure
        run: |
          echo "Checking repository structure..."
          required_dirs=("web-app" "infra" ".github")
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "Missing directory: $dir"
              exit 1
            fi
          done
          echo "Repository structure validation passed!"

      - name: Verify Documentation
        run: |
          echo "Checking documentation..."
          if [ ! -f "README.md" ]; then
            echo "README.md not found!"
            exit 1
          fi
          echo "Documentation check passed!"

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'University Web App'
          path: '.'
          format: 'JSON'
          args: >-
            --enableExperimental

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-terraform, lint-docker, build-and-test, build-docker, security-scan, code-quality, dependency-check]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.lint-terraform.result }}" = "failure" ] || \
             [ "${{ needs.lint-docker.result }}" = "failure" ] || \
             [ "${{ needs.build-and-test.result }}" = "failure" ] || \
             [ "${{ needs.build-docker.result }}" = "failure" ] || \
             [ "${{ needs.security-scan.result }}" = "failure" ] || \
             [ "${{ needs.code-quality.result }}" = "failure" ] || \
             [ "${{ needs.dependency-check.result }}" = "failure" ]; then
            echo " CI Pipeline Failed"
            exit 1
          else
            echo " CI Pipeline Passed"
          fi

      - name: Create Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Lint | ${{ needs.lint-terraform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Lint | ${{ needs.lint-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY

  publish-artifacts:
    name: Build and Publish Artifacts
    runs-on: ubuntu-latest
    needs: [lint-terraform, lint-docker, build-and-test, build-docker, security-scan, code-quality, dependency-check]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Application Bundle
        run: |
          echo "Creating application artifact bundle..."
          mkdir -p build-artifacts
          
          # Copy web app files
          cp -r web-app build-artifacts/
          
          # Copy terraform configurations
          cp -r infra build-artifacts/
          
          # Create manifest file
          cat > build-artifacts/MANIFEST.md << EOF
          # Application Build Manifest
          
          **Build Date:** $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          **Git Commit:** ${{ github.sha }}
          **Git Branch:** ${{ github.ref_name }}
          **Build Number:** ${{ github.run_number }}
          **Workflow:** ${{ github.workflow }}
          
          ## Contents
          - web-app/: Web application source code
          - infra/: Terraform infrastructure configuration
          - Dockerfile: Container image definition
          
          ## Build Tools Used
          - Terraform
          - Docker
          - NGINX
          
          **Repository:** ${{ github.repository }}
          EOF

      - name: Create Distribution Archive
        run: |
          cd build-artifacts
          tar -czf ../university-app-${{ github.run_number }}.tar.gz .
          zip -r ../university-app-${{ github.run_number }}.zip .
          cd ..
          
          echo "Archive created successfully"
          ls -lh university-app-*.tar.gz university-app-*.zip

      - name: Generate Build Report
        run: |
          cat > build-report.txt << EOF
          =========================================
          UNIVERSITY APPLICATION BUILD REPORT
          =========================================
          
          Build Information:
          - Build ID: ${{ github.run_id }}
          - Build Number: ${{ github.run_number }}
          - Commit SHA: $S{{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Triggering Actor: ${{ github.actor }}
          - Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          Artifacts Generated:
          - university-app-${{ github.run_number }}.tar.gz
          - university-app-${{ github.run_number }}.zip
          
          Pipeline Status:
          - Terraform Lint: S PASSED
          - Docker Lint:  PASSED
          - Build & Test:  PASSED
          - Docker Build:  PASSED
          - Security Scan:  PASSED
          - Code Quality:  PASSED
          - Dependency Check:  PASSED
          
          Download Artifacts:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          =========================================
          EOF
          
          cat build-report.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-build-${{ github.run_number }}
          path: |
            university-app-*.tar.gz
            university-app-*.zip
            build-report.txt
          retention-days: 90

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            university-app-*.tar.gz
            university-app-*.zip
            build-report.txt
          draft: false
          prerelease: false
          body: |
            ## Release Build
            
            **Version:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            
            ### Artifacts Included:
            - Complete web application source
            - Terraform infrastructure code
            - Docker configuration
            - Build manifest and report
            
            ### Build Pipeline Status:
             All checks passed
            
            **Release Date:** ${{ github.event.repository.updated_at }}

      - name: Upload to Build Repository
        run: |
          echo "Artifacts published successfully"
          echo "Build artifacts are available in GitHub Actions"
          echo "Archive formats: tar.gz, zip"
          echo "Retention period: 90 days"
